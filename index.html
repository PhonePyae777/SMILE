<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- iPhone App Mode -->
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

<link rel="apple-touch-icon" href="icon.png">

<title>Mood Checker</title>

<style>
body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont;
    background: linear-gradient(135deg, #667eea, #764ba2);
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    color: white;
    overflow: hidden;
}

/* Splash */
#splash {
    position: fixed;
    width: 100%;
    height: 100%;
    background: #667eea;
    display: flex;
    justify-content: center;
    align-items: center;
    font-size: 24px;
    animation: fadeOut 1s ease 2s forwards;
}

/* Main */
.container {
    text-align: center;
    width: 90%;
    max-width: 350px;
    padding: 30px;
    border-radius: 20px;
    background: rgba(255,255,255,0.1);
    backdrop-filter: blur(15px);
    animation: slideUp 0.6s ease;
}

button {
    width: 100%;
    padding: 14px;
    margin: 10px 0;
    border-radius: 12px;
    border: none;
    font-size: 16px;
    cursor: pointer;
    transition: 0.3s;
}

.yes { background: #00c853; }
.no { background: #ff1744; }

button:active {
    transform: scale(0.95);
}

/* Animations */
@keyframes slideUp {
    from {opacity: 0; transform: translateY(40px);}
    to {opacity: 1; transform: translateY(0);}
}

@keyframes fadeOut {
    to {opacity: 0; visibility: hidden;}
}
</style>
</head>

<body>

<!-- Splash Screen -->
<div id="splash">Mood Checker 💭</div>

<!-- Main Page -->
<div class="container" id="page1">
    <h2>Are you in a Good Mood?</h2>
    <button class="yes" onclick="showYes()">Yes 😊</button>
    <button class="no" onclick="showNo()">No 😞</button>
</div>

<!-- Yes Page -->
<div class="container" id="yesPage" style="display:none;">
    <h2>You can work now 💪<br>Good Luck 🍀</h2>
</div>

<!-- No Page -->
<div class="container" id="noPage" style="display:none;">
    <h2>Don't work now ❌<br>Have fun first 🎮</h2>
</div>

<!-- 🔊 AUDIO FILE -->
<audio id="noSound" preload="auto">
    <source src="no.mp3" type="audio/mpeg">
</audio>

<script>
function showYes() {
    page1.style.display = "none";
    yesPage.style.display = "block";
}

function showNo() {
    const sound = document.getElementById("noSound");
    sound.currentTime = 0;
    sound.play().catch(() => {
        console.log("Audio blocked by browser");
    });

    page1.style.display = "none";
    noPage.style.display = "block";
}
</script>

</body>
</html>
