<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- iPhone App Mode -->
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

<link rel="apple-touch-icon" href="icon.png">

<title>Mood Checker Pro</title>

<style>
body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont;
    background: radial-gradient(circle at top, #7f7fd5, #86a8e7, #91eae4);
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    overflow: hidden;
    color: white;
}

/* Splash */
#splash {
    position: fixed;
    width: 100%;
    height: 100%;
    background: linear-gradient(135deg, #667eea, #764ba2);
    display: flex;
    justify-content: center;
    align-items: center;
    font-size: 26px;
    font-weight: bold;
    letter-spacing: 1px;
    animation: fadeOut 1s ease 2s forwards;
}

/* Glass Card */
.container {
    text-align: center;
    width: 90%;
    max-width: 360px;
    padding: 30px;
    border-radius: 25px;
    background: rgba(255,255,255,0.12);
    backdrop-filter: blur(20px);
    box-shadow: 0 10px 40px rgba(0,0,0,0.2);
    animation: popIn 0.7s ease;
}

/* Buttons */
button {
    width: 100%;
    padding: 15px;
    margin: 10px 0;
    border-radius: 14px;
    border: none;
    font-size: 16px;
    font-weight: bold;
    cursor: pointer;
    transition: 0.2s ease;
}

/* Glow effect */
.yes {
    background: linear-gradient(135deg, #00c853, #64dd17);
    box-shadow: 0 0 15px rgba(0,255,100,0.3);
}

.no {
    background: linear-gradient(135deg, #ff1744, #ff5252);
    box-shadow: 0 0 15px rgba(255,0,80,0.3);
}

button:active {
    transform: scale(0.96);
    filter: brightness(1.2);
}

/* Animations */
@keyframes popIn {
    from {opacity: 0; transform: scale(0.8);}
    to {opacity: 1; transform: scale(1);}
}

@keyframes fadeOut {
    to {opacity: 0; visibility: hidden;}
}

/* Text style */
h2 {
    font-size: 20px;
    margin-bottom: 20px;
}
</style>
</head>

<body>

<!-- Splash -->
<div id="splash">Mood Checker 💭</div>

<!-- Main -->
<div class="container" id="page1">
    <h2>Are you in a Good Mood?</h2>
    <button class="yes" onclick="showYes()">Yes 😊</button>
    <button class="no" onclick="showNo()">No 😞</button>
</div>

<!-- Pages -->
<div class="container" id="yesPage" style="display:none;">
    <h2>💪 You can work now<br>Good Luck 🍀</h2>
</div>

<div class="container" id="noPage" style="display:none;">
    <h2>🎮 Don't work now<br>Have fun first 😎</h2>
</div>

<!-- 🔊 SOUND FILES -->
<audio id="yesSound" preload="auto">
    <source src="yes.mp3" type="audio/mpeg">
</audio>

<audio id="noSound" preload="auto">
    <source src="no.mp3" type="audio/mpeg">
</audio>

<script>
function showYes() {
    const sound = document.getElementById("yesSound");
    sound.currentTime = 0;
    sound.play().catch(() => {});

    page1.style.display = "none";
    yesPage.style.display = "block";
}

function showNo() {
    const sound = document.getElementById("noSound");
    sound.currentTime = 0;
    sound.play().catch(() => {});

    page1.style.display = "none";
    noPage.style.display = "block";
}
</script>

</body>
</html>
